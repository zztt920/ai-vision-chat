<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AI 视讯助手 - 多模态视觉对话应用">
  <title>AI 视讯助手</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 顶部导航栏 -->
  <header class="app-header">
    <div class="app-logo">
      <div class="icon">🎥</div>
      <span>AI 视讯助手</span>
    </div>
    <div class="status-bar">
      <div id="cam-status" class="status-item inactive">
        <span class="dot"></span>
        <span>摄像头待命</span>
      </div>
      <div id="source-status" class="status-item inactive" style="display:none">
        <span class="dot"></span>
        <span id="source-label">📷 摄像头</span>
      </div>
      <div id="mic-status" class="status-item inactive">
        <span class="dot"></span>
        <span>麦克风待命</span>
      </div>
      <div id="ai-status" class="status-item inactive">
        <span class="dot"></span>
        <span>AI 待命</span>
      </div>
    </div>
  </header>

  <!-- 主内容区 -->
  <main class="app-main">
    
    <!-- 左侧：摄像头/屏幕面板 -->
    <section class="camera-panel">
      <div class="camera-view">
        <video id="camera-video" autoplay playsinline muted></video>
        <div id="camera-placeholder" class="camera-placeholder">
          <div class="big-icon">🎥</div>
          <div>与 AI 进行视觉对话</div>
          <div style="font-size:12px;color:var(--text-muted);margin-top:8px">点击「开始对话」启动摄像头和麦克风</div>
        </div>
        <div class="camera-overlay" id="camera-overlay">
          <div id="camera-badge" class="camera-badge" style="display:none">
            <span class="rec-dot"></span> REC
          </div>
          <div id="voice-wave" class="voice-wave" style="display:none">
            <span></span><span></span><span></span><span></span><span></span>
          </div>
        </div>
      </div>
      <div class="camera-tools">
        <button id="btn-start" class="btn btn-primary">🎬 开始对话</button>
        <button id="btn-stop" class="btn btn-danger" style="display:none">⏹ 停止</button>
        <button id="btn-pause-cam" class="btn btn-sm" disabled>⏸ 暂停</button>
        <button id="btn-switch-cam" class="btn btn-sm">🔄 切换</button>
        <button id="btn-screenshare" class="btn btn-sm" style="display:none">🖥 共享屏幕</button>
      </div>
    </section>

    <!-- 右侧：对话面板 -->
    <section class="chat-panel">
      <div class="chat-header">
        <h3>💬 对话</h3>
        <div class="chat-actions">
          <button id="btn-clear" class="btn btn-sm">🗑 清空</button>
        </div>
      </div>

      <!-- 对话消息区域 -->
      <div id="chat-messages" class="chat-messages">
        <div class="welcome-message">
          <div class="big-icon">🎥</div>
          <h4>AI 视讯助手</h4>
          <p>点击上方「开始对话」按钮<br/>启动摄像头和麦克风，与 AI 进行视觉对话</p>
        </div>
      </div>

      <!-- 输入区 -->
      <div class="chat-input-area">
        <div id="interim-text" class="interim-text"></div>
        <div class="chat-input-row">
          <textarea id="chat-input" class="chat-input" placeholder="输入文字，或直接说话..." rows="1"></textarea>
          <button id="btn-send" class="btn btn-primary btn-icon" title="发送">➤</button>
        </div>
      </div>

      <!-- 状态提示栏 -->
      <div class="status-indicator-bar">
        <span id="status-dot" class="pulse-dot"></span>
        <span id="status-text" class="status-text">点击「开始对话」启动</span>
      </div>
    </section>
  </main>

  <!-- 加载模块脚本 -->
  <script src="modules/utils.js"></script>
  <script src="modules/camera.js"></script>
  <script src="modules/screenshare.js"></script>
  <script src="modules/speech.js"></script>
  <script src="modules/api.js"></script>
  <script src="modules/chat.js"></script>
  <script src="app.js"></script>

</body>
</html>
